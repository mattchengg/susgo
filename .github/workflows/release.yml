name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-fyne:
    name: Build with fyne-cross
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build for Linux
        run: |
          fyne-cross linux -arch=amd64,arm64 -app-id=com.mattchengg.sfgo -release
          
      - name: Build for Windows
        run: |
          fyne-cross windows -arch=amd64 -app-id=com.mattchengg.sfgo -release

      - name: Build for macOS
        run: |
          fyne-cross darwin -arch=amd64,arm64 -app-id=com.mattchengg.sfgo -release

      - name: Organize artifacts
        run: |
          mkdir -p artifacts
          # Linux binaries
          if [ -f fyne-cross/dist/linux-amd64/sfgo ]; then
            cp fyne-cross/dist/linux-amd64/sfgo artifacts/sfgo-linux-amd64
          fi
          if [ -f fyne-cross/dist/linux-arm64/sfgo ]; then
            cp fyne-cross/dist/linux-arm64/sfgo artifacts/sfgo-linux-arm64
          fi
          # Windows binaries
          if [ -f fyne-cross/dist/windows-amd64/sfgo.exe ]; then
            cp fyne-cross/dist/windows-amd64/sfgo.exe artifacts/sfgo-windows-amd64.exe
          fi
          # macOS binaries
          if [ -f fyne-cross/dist/darwin-amd64/sfgo.app/Contents/MacOS/sfgo ]; then
            cp fyne-cross/dist/darwin-amd64/sfgo.app/Contents/MacOS/sfgo artifacts/sfgo-darwin-amd64
          fi
          if [ -f fyne-cross/dist/darwin-arm64/sfgo.app/Contents/MacOS/sfgo ]; then
            cp fyne-cross/dist/darwin-arm64/sfgo.app/Contents/MacOS/sfgo artifacts/sfgo-darwin-arm64
          fi
          # Create macOS app bundles as tar.gz
          if [ -d fyne-cross/dist/darwin-amd64/sfgo.app ]; then
            cd fyne-cross/dist/darwin-amd64 && tar czf ../../../artifacts/sfgo-darwin-amd64.app.tar.gz sfgo.app && cd ../../..
          fi
          if [ -d fyne-cross/dist/darwin-arm64/sfgo.app ]; then
            cd fyne-cross/dist/darwin-arm64 && tar czf ../../../artifacts/sfgo-darwin-arm64.app.tar.gz sfgo.app && cd ../../..
          fi

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum sfgo-* > checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: sfgo-binaries
          path: artifacts/*

  release:
    name: Release
    needs: build-fyne
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sfgo-binaries
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
